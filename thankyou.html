<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Message Sent | Kochar Dental Care</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    setTimeout(() => {
      window.location.href = "contact.html";
    }, 4000);
  </script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-xl rounded-3xl p-10 text-center max-w-md">
    
    <div class="text-green-500 text-6xl mb-4">
      ✓
    </div>

    <h1 class="text-3xl font-bold text-slate-800 mb-3">
      Message Sent Successfully!
    </h1>

    <p class="text-slate-600 mb-4">
      Thank you for contacting <strong>Kochar Dental Care</strong>.<br>
      We have received your message and will contact you soon.
    </p>

    <p class="text-sm text-slate-400">
      Redirecting back in 4 seconds...
    </p>

    <a href="contact.html"
       class="inline-block mt-6 bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 transition">
       Back to Contact Page
    </a>

  </div>

</body>
</html>
